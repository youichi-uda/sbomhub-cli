name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -o sbomhub ./cmd/sbomhub

      - name: Verify binary
        run: ./sbomhub version
        shell: bash

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # golangci-lint doesn't support Go 1.25 yet
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # M4 Codex review #F66: production deployment release gate. Goes
  # alongside `test` / `build` / `lint` so the Dockerfile + Dockerfile.bench
  # + `llm test` + `llm bench` wrapper contract (M4-3 F42 typed exit codes
  # 2/3/4/5 via #F46 / #F57 / #F61) are fixed in CI and any regression in
  # the Dockerfile / entrypoint / Go toolchain base / bench wrapper is
  # caught before a tag-driven release reaches operators.
  #
  # Steps:
  #   1. Build the default (slim alpine) and bench (golang:1.25-alpine) images.
  #   2. Spin up a tiny stdlib python http.server that mimics sbomhub's
  #      public /api/v1/health response ({"status":"ok","mode":"self-host"})
  #      and verify the default image's `llm test --json` exits 0 against it.
  #   3. Materialise a throwaway fake sbomhub OSS checkout containing a
  #      stub `apps/api/cmd/llm-bench/main.go` that exits with whatever
  #      $FAKE_BENCH_EXIT requests, plus the canonical eval-set fixture
  #      path the wrapper preflights via os.Stat. Run the bench image
  #      against it four times (FAKE_BENCH_EXIT in {2,3,4,5}) and assert
  #      the wrapper's exit code matches verbatim — that's the M4-3 F42
  #      typed contract the wrapper promises via M4 review #F46.
  #
  # Network: the smoke step uses `--network=host` so the in-container CLI
  # can hit the host-side mock health server. ubuntu-latest exposes the
  # host network namespace to docker; on macOS/Windows runners this would
  # need a different mock-host topology (see `docker-smoke-macos` job
  # below — `--add-host=host.docker.internal:host-gateway` does NOT work
  # under Colima because it resolves to the Lima VM rather than the
  # runner host; the macOS job runs the mock as a sidecar container on
  # a user-defined bridge network instead). This Linux job stays the
  # release gate because the GHCR images we ship are Linux-only.
  #
  # M5-4 sbomhub-cli #6: BuildKit GHA cache backend wired
  # (`type=gha,mode=max`) + per-image cache scope so cold-vs-warm build
  # times are observable. The Dockerfile.bench `RUN --mount=type=cache,
  # target=/go/pkg/mod / /root/.cache/go-build` mounts (added in the
  # same patch) are layer-private cache volumes whose contents BuildKit
  # exports into the GHA cache when `mode=max` is set. Combined effect:
  # the bench image's `golang:1.25-alpine` second-stage build drops
  # from ~3-5min cold to ~30-60s warm in steady state. Build times are
  # printed into `$GITHUB_STEP_SUMMARY` so the gain is visible without
  # log-diving. ※要確認: GHA cache scope name collides with the
  # `docker-publish` job's `sbomhub-cli-default` / `sbomhub-cli-bench`
  # scopes — kept SEPARATE here (`...-smoke-...`) so a smoke-run cache
  # eviction can't corrupt the release-pipeline cache.
  #
  # Runtime (with M5-4 cache):
  #   - cold: ~5-8 min (initial cache prime — same as pre-M5-4)
  #   - warm: ~2-3 min (cache hit on Go module + build cache)
  docker-smoke:
    name: Docker production smoke (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build default Dockerfile (sbomhub-cli:ci-test) with GHA cache
        run: |
          set -euo pipefail
          START=$(date +%s)
          # `--load` makes the resulting image available to the local
          # docker daemon for subsequent `docker run` steps (default
          # buildx output is a build-only OCI layout, not loaded).
          docker buildx build \
            --tag sbomhub-cli:ci-test \
            --file Dockerfile \
            --cache-from=type=gha,scope=sbomhub-cli-smoke-default \
            --cache-to=type=gha,scope=sbomhub-cli-smoke-default,mode=max \
            --load \
            .
          ELAPSED=$(( $(date +%s) - START ))
          {
            echo "## docker-smoke (Linux) build times"
            echo ""
            echo "| image | seconds |"
            echo "|-------|---------|"
            echo "| default (alpine slim) | ${ELAPSED} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build bench Dockerfile (sbomhub-cli:ci-bench) with GHA cache
        run: |
          set -euo pipefail
          START=$(date +%s)
          docker buildx build \
            --tag sbomhub-cli:ci-bench \
            --file Dockerfile.bench \
            --cache-from=type=gha,scope=sbomhub-cli-smoke-bench \
            --cache-to=type=gha,scope=sbomhub-cli-smoke-bench,mode=max \
            --load \
            .
          ELAPSED=$(( $(date +%s) - START ))
          echo "| bench (golang:1.25-alpine) | ${ELAPSED} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Start mock /api/v1/health server (port 18080)
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/mock_health.py" <<'PY'
          # Minimal stand-in for sbomhub/apps/api's GET /api/v1/health.
          # The CLI's `sbomhub llm test` only asserts the response is 2xx
          # with a non-empty `status` field (see internal/api/llm.go and
          # the F23/F39 test coverage), so emitting {status, mode} is
          # sufficient for end-to-end docker validation.
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/api/v1/health':
                      body = json.dumps({'status': 'ok', 'mode': 'self-host'}).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, *a, **kw):  # silence noisy access log
                  pass
          http.server.HTTPServer(('0.0.0.0', 18080), H).serve_forever()
          PY
          nohup python3 "$RUNNER_TEMP/mock_health.py" \
              > "$RUNNER_TEMP/mock_health.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/mock_health.pid"
          # Poll until ready (max ~10s) so the smoke step doesn't race a
          # cold-start http.server.HTTPServer bind.
          for _ in $(seq 1 50); do
            if curl -fsS --max-time 1 http://127.0.0.1:18080/api/v1/health > /dev/null; then
              echo "Mock health server ready"
              exit 0
            fi
            sleep 0.2
          done
          echo "Mock health server failed to start" >&2
          cat "$RUNNER_TEMP/mock_health.log" >&2 || true
          exit 1

      - name: Default image llm test smoke (against mock health server)
        run: |
          set -euo pipefail
          # --network=host so the in-container CLI can reach the mock
          # python server bound to the runner host's 127.0.0.1:18080.
          # Exit 0 is the success contract for `sbomhub llm test` (the
          # wrapper exits 3 on permanent / 4 on transient failures via
          # llmHealthFailureToExitError).
          docker run --rm \
            --network=host \
            -e SBOMHUB_API_URL=http://127.0.0.1:18080 \
            sbomhub-cli:ci-test \
            llm test --json

      - name: Prepare fake sbomhub source for bench exit-code smoke
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          mkdir -p "$ROOT/apps/api/cmd/llm-bench"
          mkdir -p "$ROOT/apps/api/test/fixtures/llm-bench"
          # apps/api/go.mod must satisfy the wrapper's preflight
          # (os.Stat <workDir>/go.mod) AND match the bench image's
          # baked-in Go toolchain (golang:1.25-alpine — see
          # Dockerfile.bench's M4 #F56 rationale).
          cat > "$ROOT/apps/api/go.mod" <<'EOF'
          module github.com/sbomhub/sbomhub/apps/api

          go 1.25
          EOF
          # Fake bench binary: ignores every wrapper flag and exits with
          # whatever $FAKE_BENCH_EXIT requests. Uses only stdlib so the
          # `go build` step inside the container completes without
          # touching GOPROXY / the public module mirror.
          cat > "$ROOT/apps/api/cmd/llm-bench/main.go" <<'EOF'
          // Stub bench binary for sbomhub-cli CI docker-smoke.
          // Substitutes for sbomhub/apps/api/cmd/llm-bench so the
          // M4-3 F42 typed exit-code contract (2/3/4/5) can be
          // exercised end-to-end against the bench Docker image
          // without pulling the full sbomhub OSS checkout into CI.
          package main

          import (
              "os"
              "strconv"
          )

          func main() {
              // FAKE_BENCH_EXIT is set by the CI smoke step; default 0
              // when unset so an accidental invocation behaves as
              // "successful run" rather than a crash.
              code, _ := strconv.Atoi(os.Getenv("FAKE_BENCH_EXIT"))
              os.Exit(code)
          }
          EOF
          # The wrapper resolves --eval-set against <source>/apps/api/
          # test/fixtures/llm-bench/cve-20-50.json and os.Stat()s it
          # before exec'ing the bench binary; provide a stub so the
          # preflight passes. The fake bench binary itself ignores the
          # contents.
          echo '[]' > "$ROOT/apps/api/test/fixtures/llm-bench/cve-20-50.json"

      - name: Bench image inner exit code pass-through smoke (N=2/3/4/5)
        run: |
          set -uo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          FAIL=0
          for N in 2 3 4 5; do
            set +e
            docker run --rm \
              -v "$ROOT:/workspace/sbomhub" \
              -e FAKE_BENCH_EXIT="$N" \
              sbomhub-cli:ci-bench \
              llm bench \
                --sbomhub-source /workspace/sbomhub \
                --providers openai \
                --max-cases 1 \
                --timeout 5
            WRAPPER_EXIT=$?
            set -e
            if [ "$WRAPPER_EXIT" != "$N" ]; then
              echo "FAIL: bench inner exit=$N but wrapper exit=$WRAPPER_EXIT" >&2
              FAIL=1
            else
              echo "OK:   bench inner exit=$N → wrapper exit=$WRAPPER_EXIT"
            fi
          done
          if [ "$FAIL" != "0" ]; then
            echo "M4-3 F42 typed exit code pass-through (#F46/#F61) regressed" >&2
            exit 1
          fi

      - name: Stop mock health server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/mock_health.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/mock_health.pid")" 2>/dev/null || true
          fi

  # M5-4 sbomhub-cli #6: cross-OS coverage for the M4 #F66 docker-smoke
  # gate. Same shape as `docker-smoke` (Dockerfile + Dockerfile.bench
  # build, default-image `llm test` smoke, bench-image inner exit-code
  # pass-through smoke) but on macOS so a Dockerfile regression that
  # only surfaces under Colima (alpine apk wheel arch, /go cache-mount
  # POSIX semantics, etc.) is caught before a tag.
  #
  # macOS runner constraints (M5-4 web research, 2026-06):
  #   - Apple Silicon (`macos-26` / `macos-latest`) does NOT support
  #     the nested virtualisation Colima/Lima need; both upstreams
  #     refuse to start. → pin to `macos-15-intel` for now.
  #   - Docker Desktop has no CI-friendly headless installer.
  #     `douglascamata/setup-docker-macos-action@v1.1.0` (Dec 2025)
  #     wraps Homebrew + Colima and is the de-facto choice cited by
  #     most macOS-on-GHA Docker recipes in 2026.
  #   - `--network=host` does NOT work on Colima (it joins the Lima
  #     VM's network namespace, not the macOS host's). The
  #     `--add-host=host.docker.internal:host-gateway` workaround
  #     suggested in some docs ALSO fails on Colima — it resolves to
  #     the Lima VM, not the runner host (Colima upstream #277/#902).
  #     Working substitute: run the mock /api/v1/health server as a
  #     sidecar container on a user-defined bridge network and have
  #     the CLI container reach it via container-DNS hostname.
  #   - Cold start (Homebrew + Colima VM + image pull) is 3-7 min,
  #     small-image build 2-4 min, smoke 1-2 min. timeout-minutes 30
  #     leaves headroom for runner variance.
  #
  # Release gate scope: this job runs on every push/PR for cross-OS
  # signal but is intentionally NOT in `needs:` for `release` /
  # `docker-publish`. Rationale: the GHCR images we ship are
  # Linux-only (`linux/amd64,linux/arm64`), macOS runner variance is
  # ~3-4x Linux, and Intel `macos-15` will eventually be retired —
  # gating a release on a macOS-only flake would block recovery on
  # transient runner issues. The Linux `docker-smoke` job stays the
  # binding release gate.
  #
  # ※要確認:
  #   - GitHub may enable nested-virt on `macos-*` ARM runners later;
  #     when that lands, switch `runs-on` to `macos-latest` and drop
  #     the `macos-15-intel` pin (track Colima #1427).
  #   - `macos-15-intel` itself is on a deprecation path; reassess
  #     this job when Intel runners are retired (likely 2026 H2 or
  #     later per actions/runner-images announcements).
  docker-smoke-macos:
    name: Docker production smoke (macOS, informational)
    runs-on: macos-15-intel
    timeout-minutes: 30
    # Informational only — see release-gate rationale in the leading
    # comment block. Failures show up as a red job on PRs / pushes but
    # do not block tag-driven releases.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker (Colima) on macOS
        # v1.1.0 is the latest tag as of 2026-06.
        uses: douglascamata/setup-docker-macos-action@v1.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build default Dockerfile (sbomhub-cli:ci-test) with GHA cache
        run: |
          set -euo pipefail
          START=$(date +%s)
          # Separate cache scope from the Linux smoke job so a macOS
          # build (different host platform headers under Colima) cannot
          # corrupt Linux cache reuse and vice versa.
          docker buildx build \
            --tag sbomhub-cli:ci-test \
            --file Dockerfile \
            --cache-from=type=gha,scope=sbomhub-cli-smoke-macos-default \
            --cache-to=type=gha,scope=sbomhub-cli-smoke-macos-default,mode=max \
            --load \
            .
          ELAPSED=$(( $(date +%s) - START ))
          {
            echo "## docker-smoke (macOS) build times"
            echo ""
            echo "| image | seconds |"
            echo "|-------|---------|"
            echo "| default (alpine slim) | ${ELAPSED} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build bench Dockerfile (sbomhub-cli:ci-bench) with GHA cache
        run: |
          set -euo pipefail
          START=$(date +%s)
          docker buildx build \
            --tag sbomhub-cli:ci-bench \
            --file Dockerfile.bench \
            --cache-from=type=gha,scope=sbomhub-cli-smoke-macos-bench \
            --cache-to=type=gha,scope=sbomhub-cli-smoke-macos-bench,mode=max \
            --load \
            .
          ELAPSED=$(( $(date +%s) - START ))
          echo "| bench (golang:1.25-alpine) | ${ELAPSED} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create user-defined bridge network for mock + CLI
        # See leading comment block: Colima makes `--network=host`
        # and `--add-host=host.docker.internal:host-gateway` both
        # useless for reaching a macOS-host-side service. A
        # user-defined bridge network gives mock + CLI a shared
        # container-DNS resolution path that works identically on
        # Linux and macOS Docker engines.
        run: docker network create sbomhub-smoke-net

      - name: Start mock /api/v1/health server (sidecar container)
        run: |
          set -euo pipefail
          # Materialise the same mock_health.py used by the Linux
          # smoke job into a temp dir, then run it inside a python
          # container on the shared bridge network so the CLI
          # container can reach it via the hostname `mock-health`.
          mkdir -p "$RUNNER_TEMP/mock"
          cat > "$RUNNER_TEMP/mock/mock_health.py" <<'PY'
          # Mirror of the Linux docker-smoke job's mock_health.py —
          # M4 #F66 / M5-4 #6. Kept in-source rather than factored
          # into a shared file because both job inlines must stay
          # self-contained (one runs on a runner host, the other in
          # a container) and the body is short.
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/api/v1/health':
                      body = json.dumps({'status': 'ok', 'mode': 'self-host'}).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, *a, **kw):
                  pass
          http.server.HTTPServer(('0.0.0.0', 18080), H).serve_forever()
          PY
          docker run --rm -d \
            --name mock-health \
            --network sbomhub-smoke-net \
            -v "$RUNNER_TEMP/mock:/mock:ro" \
            python:3.13-alpine \
            python3 /mock/mock_health.py
          # Poll until ready (max ~30s — Colima networking can take a
          # moment to settle the bridge).
          for _ in $(seq 1 150); do
            if docker run --rm --network sbomhub-smoke-net curlimages/curl:latest \
                -fsS --max-time 1 http://mock-health:18080/api/v1/health > /dev/null 2>&1; then
              echo "Mock health server ready"
              exit 0
            fi
            sleep 0.2
          done
          echo "Mock health server failed to start" >&2
          docker logs mock-health >&2 || true
          exit 1

      - name: Default image llm test smoke (against sidecar mock)
        run: |
          set -euo pipefail
          docker run --rm \
            --network sbomhub-smoke-net \
            -e SBOMHUB_API_URL=http://mock-health:18080 \
            sbomhub-cli:ci-test \
            llm test --json

      - name: Prepare fake sbomhub source for bench exit-code smoke
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          mkdir -p "$ROOT/apps/api/cmd/llm-bench"
          mkdir -p "$ROOT/apps/api/test/fixtures/llm-bench"
          cat > "$ROOT/apps/api/go.mod" <<'EOF'
          module github.com/sbomhub/sbomhub/apps/api

          go 1.25
          EOF
          cat > "$ROOT/apps/api/cmd/llm-bench/main.go" <<'EOF'
          // Stub bench binary — mirrors the Linux smoke job. See the
          // `docker-smoke` (Linux) prepare step for full rationale.
          package main

          import (
              "os"
              "strconv"
          )

          func main() {
              code, _ := strconv.Atoi(os.Getenv("FAKE_BENCH_EXIT"))
              os.Exit(code)
          }
          EOF
          echo '[]' > "$ROOT/apps/api/test/fixtures/llm-bench/cve-20-50.json"

      - name: Bench image inner exit code pass-through smoke (N=2/3/4/5)
        run: |
          set -uo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          FAIL=0
          for N in 2 3 4 5; do
            set +e
            # Bench smoke does NOT need network access (the stub
            # binary just reads $FAKE_BENCH_EXIT and exits), so no
            # --network flag — works identically on Linux and macOS.
            docker run --rm \
              -v "$ROOT:/workspace/sbomhub" \
              -e FAKE_BENCH_EXIT="$N" \
              sbomhub-cli:ci-bench \
              llm bench \
                --sbomhub-source /workspace/sbomhub \
                --providers openai \
                --max-cases 1 \
                --timeout 5
            WRAPPER_EXIT=$?
            set -e
            if [ "$WRAPPER_EXIT" != "$N" ]; then
              echo "FAIL: bench inner exit=$N but wrapper exit=$WRAPPER_EXIT" >&2
              FAIL=1
            else
              echo "OK:   bench inner exit=$N → wrapper exit=$WRAPPER_EXIT"
            fi
          done
          if [ "$FAIL" != "0" ]; then
            echo "M4-3 F42 typed exit code pass-through (#F46/#F61) regressed on macOS" >&2
            exit 1
          fi

      - name: Stop mock health server
        if: always()
        run: |
          docker rm -f mock-health 2>/dev/null || true
          docker network rm sbomhub-smoke-net 2>/dev/null || true

  # M5-4 sbomhub-cli #6: Windows runner docker-smoke INTENTIONALLY OMITTED.
  #
  # Rationale:
  #   - GitHub Actions Windows runners only expose Linux containers via
  #     a nested Hyper-V Linux VM (or WSL2). Cold-start (Docker Desktop
  #     install + WSL2 distro provisioning + image build) is empirically
  #     15-30 min, an order of magnitude worse than ubuntu-latest's
  #     ~5-8 min for the same docker-smoke contract.
  #   - The GHCR-published `sbomhub-cli` / `sbomhub-cli:bench` images
  #     are Linux-only (alpine base). Operators on Windows running the
  #     `docker run ghcr.io/...:bench` instructions from README do so via
  #     Docker Desktop's WSL2 backend on their workstation — so the
  #     surface validated by the Linux smoke job IS the surface they run.
  #   - The `build` job already covers the native Windows binary build
  #     (`go build` on `windows-latest`), and goreleaser handles the
  #     native Windows binary release path (see `.goreleaser.yaml`).
  #
  # If a future regression is suspected to be Windows-Docker-specific
  # (e.g. CRLF in entrypoint scripts, NTFS exec-bit handling), revisit
  # this decision — but make the operator pain explicit (a 30-min
  # cold-start job for a Linux-only image surface is hard to justify
  # as a default release gate).

  # M4 Codex review #F71: README documents
  # `ghcr.io/youichi-uda/sbomhub-cli:bench` (and the default image) as
  # the production Docker path for operators running `sbomhub llm bench`
  # / other subcommands, but the release pipeline previously only
  # published binaries via GoReleaser — no Docker image was ever pushed
  # to GHCR on a tag. The F66 `docker-smoke` gate above verified the
  # Dockerfile contract on every push but did not publish; operators
  # following the README `docker run ghcr.io/...:bench` instructions
  # would 404. This job closes that gap.
  #
  # Approach: option (b) from the F71 fix proposal — keep the existing
  # `.goreleaser.yaml` binary release shape untouched and add a separate
  # workflow job that uses `docker/build-push-action` against the
  # existing `Dockerfile` / `Dockerfile.bench`. The alternative (adding
  # GoReleaser `dockers` entries) would require refactoring both
  # Dockerfiles to `COPY` a pre-built binary instead of building from
  # source, which is out of scope for an F71 ci-only fix.
  #
  # Tags published per release (vX.Y.Z):
  #   ghcr.io/youichi-uda/sbomhub-cli:vX.Y.Z          (default, slim)
  #   ghcr.io/youichi-uda/sbomhub-cli:latest          (default, slim)
  #   ghcr.io/youichi-uda/sbomhub-cli:vX.Y.Z-bench    (bench variant)
  #   ghcr.io/youichi-uda/sbomhub-cli:bench           (bench variant)
  #
  # `:latest` and `:bench` are floating tags that always point at the
  # most recent tag-driven release so the README's
  # `ghcr.io/youichi-uda/sbomhub-cli:bench` instruction keeps resolving
  # without operators having to track version numbers.
  #
  # Multi-arch: both images are built for linux/amd64 + linux/arm64 via
  # docker buildx + QEMU emulation. The default `Dockerfile` (alpine
  # base, `golang:1.22-alpine` build stage) and `Dockerfile.bench`
  # (`golang:1.25-alpine`) both pull multi-arch base images from
  # Docker Hub, so the cross-build is a straightforward QEMU `go build`
  # with no Dockerfile changes required.
  #
  # Gate: runs only on `v*` tag pushes, after the same
  # `[test, build, docker-smoke]` chain that gates `release`. The
  # `release` job (GoReleaser) and this job run in parallel — a Docker
  # publish failure does not block the binary release, and vice versa.
  # That keeps the two distribution paths independently recoverable on
  # transient registry / runner failures; if either fails the maintainer
  # can re-run the single failed job without re-cutting the tag.
  docker-publish:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    needs: [test, build, docker-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push default image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/youichi-uda/sbomhub-cli:${{ github.ref_name }}
            ghcr.io/youichi-uda/sbomhub-cli:latest
          cache-from: type=gha,scope=sbomhub-cli-default
          cache-to: type=gha,scope=sbomhub-cli-default,mode=max

      - name: Build and push bench image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.bench
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/youichi-uda/sbomhub-cli:${{ github.ref_name }}-bench
            ghcr.io/youichi-uda/sbomhub-cli:bench
          cache-from: type=gha,scope=sbomhub-cli-bench
          cache-to: type=gha,scope=sbomhub-cli-bench,mode=max

  release:
    name: Release
    runs-on: ubuntu-latest
    # M4 Codex review #F66: docker-smoke is a release gate so the
    # Dockerfile / Dockerfile.bench / bench wrapper exit-code contract
    # is verified before any tag is published. lint stays excluded
    # until golangci-lint supports Go 1.25.
    #
    # M4 Codex review #F71: docker image publish (`docker-publish` job
    # above) runs in parallel with this job on the same gate — both
    # need [test, build, docker-smoke] — so binary and Docker
    # distribution paths are independently recoverable on a failed
    # publish.
    needs: [test, build, docker-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
