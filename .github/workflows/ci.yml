name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -o sbomhub ./cmd/sbomhub

      - name: Verify binary
        run: ./sbomhub version
        shell: bash

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true  # golangci-lint doesn't support Go 1.25 yet
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # M4 Codex review #F66: production deployment release gate. Goes
  # alongside `test` / `build` / `lint` so the Dockerfile + Dockerfile.bench
  # + `llm test` + `llm bench` wrapper contract (M4-3 F42 typed exit codes
  # 2/3/4/5 via #F46 / #F57 / #F61) are fixed in CI and any regression in
  # the Dockerfile / entrypoint / Go toolchain base / bench wrapper is
  # caught before a tag-driven release reaches operators.
  #
  # Steps:
  #   1. Build the default (slim alpine) and bench (golang:1.25-alpine) images.
  #   2. Spin up a tiny stdlib python http.server that mimics sbomhub's
  #      public /api/v1/health response ({"status":"ok","mode":"self-host"})
  #      and verify the default image's `llm test --json` exits 0 against it.
  #   3. Materialise a throwaway fake sbomhub OSS checkout containing a
  #      stub `apps/api/cmd/llm-bench/main.go` that exits with whatever
  #      $FAKE_BENCH_EXIT requests, plus the canonical eval-set fixture
  #      path the wrapper preflights via os.Stat. Run the bench image
  #      against it four times (FAKE_BENCH_EXIT in {2,3,4,5}) and assert
  #      the wrapper's exit code matches verbatim — that's the M4-3 F42
  #      typed contract the wrapper promises via M4 review #F46.
  #
  # Network: the smoke step uses `--network=host` so the in-container CLI
  # can hit the host-side mock health server. ubuntu-latest exposes the
  # host network namespace to docker; on macOS/Windows runners this would
  # need `--add-host=host.docker.internal:host-gateway` instead, but the
  # job is pinned to ubuntu-latest because we only need to validate the
  # Linux image surface published to GHCR.
  #
  # Runtime: ~5-8 minutes per push (default build ~30s, bench build with
  # Go toolchain ~3-5min, smoke ~1-2min). Acceptable for a release-gate
  # job that only fires on push to main / tags / PRs.
  docker-smoke:
    name: Docker production smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build default Dockerfile (sbomhub-cli:ci-test)
        run: docker build -t sbomhub-cli:ci-test -f Dockerfile .

      - name: Build bench Dockerfile (sbomhub-cli:ci-bench)
        run: docker build -t sbomhub-cli:ci-bench -f Dockerfile.bench .

      - name: Start mock /api/v1/health server (port 18080)
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/mock_health.py" <<'PY'
          # Minimal stand-in for sbomhub/apps/api's GET /api/v1/health.
          # The CLI's `sbomhub llm test` only asserts the response is 2xx
          # with a non-empty `status` field (see internal/api/llm.go and
          # the F23/F39 test coverage), so emitting {status, mode} is
          # sufficient for end-to-end docker validation.
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/api/v1/health':
                      body = json.dumps({'status': 'ok', 'mode': 'self-host'}).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, *a, **kw):  # silence noisy access log
                  pass
          http.server.HTTPServer(('0.0.0.0', 18080), H).serve_forever()
          PY
          nohup python3 "$RUNNER_TEMP/mock_health.py" \
              > "$RUNNER_TEMP/mock_health.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/mock_health.pid"
          # Poll until ready (max ~10s) so the smoke step doesn't race a
          # cold-start http.server.HTTPServer bind.
          for _ in $(seq 1 50); do
            if curl -fsS --max-time 1 http://127.0.0.1:18080/api/v1/health > /dev/null; then
              echo "Mock health server ready"
              exit 0
            fi
            sleep 0.2
          done
          echo "Mock health server failed to start" >&2
          cat "$RUNNER_TEMP/mock_health.log" >&2 || true
          exit 1

      - name: Default image llm test smoke (against mock health server)
        run: |
          set -euo pipefail
          # --network=host so the in-container CLI can reach the mock
          # python server bound to the runner host's 127.0.0.1:18080.
          # Exit 0 is the success contract for `sbomhub llm test` (the
          # wrapper exits 3 on permanent / 4 on transient failures via
          # llmHealthFailureToExitError).
          docker run --rm \
            --network=host \
            -e SBOMHUB_API_URL=http://127.0.0.1:18080 \
            sbomhub-cli:ci-test \
            llm test --json

      - name: Prepare fake sbomhub source for bench exit-code smoke
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          mkdir -p "$ROOT/apps/api/cmd/llm-bench"
          mkdir -p "$ROOT/apps/api/test/fixtures/llm-bench"
          # apps/api/go.mod must satisfy the wrapper's preflight
          # (os.Stat <workDir>/go.mod) AND match the bench image's
          # baked-in Go toolchain (golang:1.25-alpine — see
          # Dockerfile.bench's M4 #F56 rationale).
          cat > "$ROOT/apps/api/go.mod" <<'EOF'
          module github.com/sbomhub/sbomhub/apps/api

          go 1.25
          EOF
          # Fake bench binary: ignores every wrapper flag and exits with
          # whatever $FAKE_BENCH_EXIT requests. Uses only stdlib so the
          # `go build` step inside the container completes without
          # touching GOPROXY / the public module mirror.
          cat > "$ROOT/apps/api/cmd/llm-bench/main.go" <<'EOF'
          // Stub bench binary for sbomhub-cli CI docker-smoke.
          // Substitutes for sbomhub/apps/api/cmd/llm-bench so the
          // M4-3 F42 typed exit-code contract (2/3/4/5) can be
          // exercised end-to-end against the bench Docker image
          // without pulling the full sbomhub OSS checkout into CI.
          package main

          import (
              "os"
              "strconv"
          )

          func main() {
              // FAKE_BENCH_EXIT is set by the CI smoke step; default 0
              // when unset so an accidental invocation behaves as
              // "successful run" rather than a crash.
              code, _ := strconv.Atoi(os.Getenv("FAKE_BENCH_EXIT"))
              os.Exit(code)
          }
          EOF
          # The wrapper resolves --eval-set against <source>/apps/api/
          # test/fixtures/llm-bench/cve-20-50.json and os.Stat()s it
          # before exec'ing the bench binary; provide a stub so the
          # preflight passes. The fake bench binary itself ignores the
          # contents.
          echo '[]' > "$ROOT/apps/api/test/fixtures/llm-bench/cve-20-50.json"

      - name: Bench image inner exit code pass-through smoke (N=2/3/4/5)
        run: |
          set -uo pipefail
          ROOT="$RUNNER_TEMP/fake-sbomhub"
          FAIL=0
          for N in 2 3 4 5; do
            set +e
            docker run --rm \
              -v "$ROOT:/workspace/sbomhub" \
              -e FAKE_BENCH_EXIT="$N" \
              sbomhub-cli:ci-bench \
              llm bench \
                --sbomhub-source /workspace/sbomhub \
                --providers openai \
                --max-cases 1 \
                --timeout 5
            WRAPPER_EXIT=$?
            set -e
            if [ "$WRAPPER_EXIT" != "$N" ]; then
              echo "FAIL: bench inner exit=$N but wrapper exit=$WRAPPER_EXIT" >&2
              FAIL=1
            else
              echo "OK:   bench inner exit=$N → wrapper exit=$WRAPPER_EXIT"
            fi
          done
          if [ "$FAIL" != "0" ]; then
            echo "M4-3 F42 typed exit code pass-through (#F46/#F61) regressed" >&2
            exit 1
          fi

      - name: Stop mock health server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/mock_health.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/mock_health.pid")" 2>/dev/null || true
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    # M4 Codex review #F66: docker-smoke is a release gate so the
    # Dockerfile / Dockerfile.bench / bench wrapper exit-code contract
    # is verified before any tag is published. lint stays excluded
    # until golangci-lint supports Go 1.25.
    needs: [test, build, docker-smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
